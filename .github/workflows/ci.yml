name: CI
on:
  push:
  pull_request:
jobs:
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - run: composer install --no-interaction --prefer-dist
      - run: composer lint
      - run: composer test
      - run: php -S 127.0.0.1:8080 >/tmp/privacy-check.log 2>&1 &
      - run: sleep 2 && curl --fail --silent http://127.0.0.1:8080/api/check.php | grep '"status":"ok"'
